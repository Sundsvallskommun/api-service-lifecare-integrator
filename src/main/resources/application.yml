#========================================
# General settings
#========================================
logging:
  level:
    root: INFO
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
spring:
  application:
    name: api-lifecare-integrator
  security:
    oauth2:
      client:
        registration:
          party:
            authorization-grant-type: client_credentials
            provider: party

#========================================
# Integrations
#========================================
integration:
  # Lifecare Welfare API Services / Elderly care (EC) — WE.EC.Integration.Host. Auth is domain + key (query params /
  # X-API-Key header); the key is a secret — override per environment, never commit it.
  lifecare-ec:
    url: override-me
    domain: override-me
    key: override-me
  lifecare-fc:
    url: override-me
    domain: override-me
    key: override-me

resilience4j:
  circuitbreaker:
    instances:
      lifecare-ec:
        ignoreExceptions: se.sundsvall.dept44.exception.ClientProblem
      lifecare-fc:
        ignoreExceptions: se.sundsvall.dept44.exception.ClientProblem
