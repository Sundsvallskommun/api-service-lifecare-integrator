#========================================
# General settings
#========================================
logging:
  level:
    root: INFO
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
spring:
  application:
    name: api-lifecare-integrator
#========================================
# Integrations
#========================================
integration:
  # Lifecare Welfare API Services / Elderly care (EC) — WE.EC.Integration.Host. Auth is domain + key (query params /
  # X-API-Key header); the key is a secret — override per environment, never commit it.
  lifecare-ec:
    url: ${INTEGRATION_LIFECARE_EC_URL:http://localhost}
    domain: ${INTEGRATION_LIFECARE_EC_DOMAIN:override}
    key: ${INTEGRATION_LIFECARE_EC_KEY:override}
